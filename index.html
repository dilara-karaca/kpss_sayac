<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="KPSS Lisans sınavına kalan süreyi gün, saat, dakika ve saniye olarak canlı gösteren modern KPSS geri sayım sayacı.">
  <meta name="keywords" content="KPSS Geri Sayım, KPSS Sayaç, KPSS 2026, KPSS 2027, KPSS Ne Kadar Kaldı">
  <meta name="author" content="KPSS Geri Sayım">
  <meta name="theme-color" content="#F58220">
  <meta name="application-name" content="KPSS Geri Sayım">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="KPSS Sayaç">

  <title>KPSS Geri Sayım | KPSS Sayaç</title>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand-area">
        <img class="brand-mark" src="assets/kpss_sayac.png" alt="KPSS Sayaç">
        <div>
          <h1>KPSS Lisans Geri Sayım</h1>
        </div>
      </div>
      <button class="theme-toggle" id="themeToggle" type="button" aria-label="Koyu modu aç" title="Tema değiştir">
        <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
        </svg>
        <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M21 13.2A7.5 7.5 0 1 1 10.8 3a6.2 6.2 0 0 0 10.2 10.2Z"></path>
        </svg>
      </button>
    </div>
  </header>

  <main class="page-shell">
    <section class="countdown-card" aria-labelledby="countdown-title">
      <div class="card-head">
        <p class="section-label">Canlı Sayaç</p>
        <h2 id="countdown-title">KPSS Lisans Geri Sayım</h2>
        <p class="exam-date" id="examDateText">Sınav tarihi yükleniyor</p>
      </div>

      <div class="countdown-grid" role="timer" aria-live="polite">
        <div class="time-box">
          <span class="time-value" id="days">000</span>
          <span class="time-label">Gün</span>
        </div>
        <div class="time-box">
          <span class="time-value" id="hours">00</span>
          <span class="time-label">Saat</span>
        </div>
        <div class="time-box">
          <span class="time-value" id="minutes">00</span>
          <span class="time-label">Dakika</span>
        </div>
        <div class="time-box">
          <span class="time-value" id="seconds">00</span>
          <span class="time-label">Saniye</span>
        </div>
      </div>

      <p class="status-text" id="statusText">Sayaç her saniye otomatik güncellenir.</p>
    </section>
  </main>

  <footer class="site-footer">
    Bu site resmi bir kuruma bağlı değildir. Bilgilerin doğruluğunu ilgili kurumun web sitesinden teyit edebilirsiniz.
  </footer>

  <script src="script.js"></script>
</body>
</html>
